<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            font-family: 'Courier New', 'MS Gothic', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .terminal {
            max-width: 780px;
            width: 100%;
            background: #0d0d0d;
            border-radius: 20px;
            padding: 28px 30px 34px;
            box-shadow: 0 0 40px rgba(255, 100, 150, 0.08), 0 0 80px rgba(255, 100, 150, 0.04);
            border: 1px solid #2a2a2a;
        }

        .terminal-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 14px;
            border-bottom: 1px solid #222;
            margin-bottom: 18px;
        }
        .terminal-header .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-red { background: #ff5f56; }
        .dot-yellow { background: #ffbd2e; }
        .dot-green { background: #27c93f; }
        .terminal-header .title {
            color: #888;
            font-size: 13px;
            margin-left: 8px;
            letter-spacing: 1px;
        }

        /* ---- 色クラス（PythonのCOLORSに対応） ---- */
        .text-red { color: #ff6b6b; }
        .text-pink { color: #ff8a9f; }
        .text-cyan { color: #6bc5d0; }
        .text-green { color: #69db7c; }
        .text-yellow { color: #ffd93d; }
        .text-gray { color: #888; }
        .text-bold { font-weight: bold; }
        .text-reset { color: #d4d4d4; }

        /* ---- 表示エリア ---- */
        .message-area {
            background: #111;
            border-radius: 12px;
            padding: 18px 20px;
            min-height: 280px;
            max-height: 420px;
            overflow-y: auto;
            font-size: 15px;
            line-height: 1.8;
            color: #d4d4d4;
            border: 1px solid #222;
            margin-bottom: 16px;
            font-family: 'Courier New', 'MS Gothic', monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .message-area::-webkit-scrollbar {
            width: 4px;
        }
        .message-area::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .message-area::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 8px;
        }

        /* ---- ステータス ---- */
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #aaa;
            padding: 8px 4px 14px 4px;
            border-bottom: 1px solid #1e1e1e;
            margin-bottom: 14px;
        }
        .status-bar .affection {
            color: #ff8a9f;
            font-weight: bold;
        }
        .status-bar .scene {
            color: #6bc5d0;
        }

        /* ---- 選択肢ボタン ---- */
        .choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 4px;
        }
        .choices button {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 12px 10px;
            font-size: 13px;
            font-family: 'Courier New', 'MS Gothic', monospace;
            color: #d4d4d4;
            cursor: pointer;
            transition: 0.15s;
            text-align: left;
            line-height: 1.4;
            word-break: break-word;
        }
        .choices button:hover {
            background: #2a2a2a;
            border-color: #ff8a9f;
            transform: scale(0.98);
        }
        .choices button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
            border-color: #333;
        }
        .choices button .num {
            color: #ff8a9f;
            font-weight: bold;
            margin-right: 6px;
        }

        /* ---- ハート表示 ---- */
        .heart-line {
            text-align: center;
            font-size: 18px;
            color: #ff8a9f;
            letter-spacing: 4px;
            padding: 4px 0 6px;
            opacity: 0.8;
        }

        /* ---- リセットボタン ---- */
        .reset-area {
            text-align: center;
            margin-top: 16px;
        }
        .reset-area button {
            background: transparent;
            border: 1px solid #333;
            border-radius: 40px;
            padding: 8px 28px;
            font-size: 13px;
            font-family: 'Courier New', 'MS Gothic', monospace;
            color: #888;
            cursor: pointer;
            transition: 0.15s;
        }
        .reset-area button:hover {
            border-color: #666;
            color: #ccc;
        }

        /* ---- レスポンシブ ---- */
        @media (max-width: 480px) {
            .terminal { padding: 18px 14px 24px; }
            .choices { grid-template-columns: 1fr; }
            .message-area { min-height: 200px; font-size: 14px; }
            .choices button { font-size: 12px; padding: 10px 12px; }
        }
    </style>
</head>

(function() {

        const cls = colorMap[color] || 'text-reset';
        return `<span class="${cls}">${text}</span>`;
    }

    // ---------- メッセージ表示（print_slowの再現） ----------
    function printSlow(text, delay = 30, color = 'reset') {
        return new Promise((resolve) => {
            if (isPrinting) {
                // 現在の印刷が終わるまで待つ
                const check = () => {
                    if (!isPrinting) {
                        _doPrintSlow(text, delay, color, resolve);
                    } else {
                        setTimeout(check, 50);
                    }
                };
                check();
                return;
            }
            _doPrintSlow(text, delay, color, resolve);
        });
    }

    function _doPrintSlow(text, delay, color, resolve) {
        isPrinting = true;
        const cls = colorMap[color] || 'text-reset';
        const span = document.createElement('span');
        span.className = cls;
        span.textContent = '';
        messageArea.appendChild(span);

        let index = 0;
        const chars = [...text];

        // 既存の改行を維持するため、最後に改行を入れたい場合は別途処理
        function printNext() {
            if (index >= chars.length) {
                // 改行を追加（表示の区切り）
                const br = document.createElement('br');
                messageArea.appendChild(br);
                isPrinting = false;
                messageArea.scrollTop = messageArea.scrollHeight;
                resolve();
                return;
            }
            const ch = chars[index];
            if (ch === '\n') {
                // 改行はそのまま改行要素を追加
                const br = document.createElement('br');
                messageArea.appendChild(br);
                index++;
                // 改行後も同じスタイルを維持
                printNext();
                return;
            }
            span.textContent += ch;
            index++;
            messageArea.scrollTop = messageArea.scrollHeight;
            const nextDelay = (ch === '。' || ch === '！' || ch === '？' || ch === '、') ? delay * 2 : delay;

        }

        printNext();
    }

    // ----------イベント ----------
    async function rescueEvent() {
        if (state.rescueUsed) return;
        state.rescueUsed = true;
        await printSlow('🔥 緊急イベント発生！', 30, 'red');
        await printSlow('メタ子が突然、静かに口を開いた…', 30, 'yellow');
        await printSlow('「…なんで、そんなに私のことを気にかけてくれるの？ …実は、私、寂しかったんだ。」', 40, 'pink');
        await printSlow('メタ子の目に涙が浮かんでいる。君は優しく「だって君が大事だからだよ」と返す。', 30, 'cyan');
        await printSlow('→ 好感度が +15 上昇した！', 30, 'green');
        state.affection = Math.min(100, state.affection + 15);
        updateStatus();
    }

    // ---------- シーン実行 ----------
    async function runScene() {
        if (state.gameOver || state.ended) return;

        state.sceneCount++;
        state.turn++;

        showHeart();
        await printSlow(`─── Act ${state.sceneCount} : 深夜のオフィス ───`, 20, 'cyan');
        await new Promise(r => setTimeout(r, 300));

        // 救済イベントチェック
        if (state.affection <= 30 && !state.rescueUsed) {
            await rescueEvent();
            await new Promise(r => setTimeout(r, 500));
        }

        // 選択肢をランダム抽出 (3〜4個)
        const numChoices = Math.floor(Math.random() * 2) + 3; // 3 or 4
        const shuffled = [...ACTION_POOL];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        const selectedActions = shuffled.slice(0, numChoices);

        // ステータス表示
        updateStatus();

        // 選択肢の描画
        choicesArea.innerHTML = '';
        for (let i = 0; i < selectedActions.length; i++) {
            const action = selectedActions[i];
            const btn = document.createElement('button');
            btn.innerHTML = `<span class="num">${i+1}.</span> ${action[0]}`;
            btn.dataset.index = i;
            btn.addEventListener('click', () => handleChoice(selectedActions, i));
            choicesArea.appendChild(btn);
        }

        // メッセージに「選択肢を選んでください」を表示
        await printSlow(`📊 好感度: ${state.affection}/100`, 20, 'bold');
        await printSlow('【どうする？ (選択肢は毎回変化)】', 20, 'yellow');

        // 選択肢を押すまで待つ（Promiseで制御）
        return new Promise((resolve) => {
            window._choiceResolver = resolve;
            window._selectedActions = selectedActions;
        });
    }

    // ---------- 選択肢ハンドラ ----------
    async function handleChoice(selectedActions, index) {
        if (state.gameOver || state.ended) return;

        // ボタンを無効化
        document.querySelectorAll('.choices button').forEach(b => b.disabled = true);

        const action = selectedActions[index];
        const actionText = action[0];
        let responseText = action[1];
        let delta = action[2];

        // force push 判定
        if (actionText.toLowerCase().includes('force push')) {
            state.forcePush = true;
        }

        // プラス補正: たまにボーナス
        if (delta > 0 && Math.random() < 0.2) {
            delta += 1;
            responseText += ' (さらに＋1のボーナス！)';
        }

        // 好感度更新
        state.affection = Math.max(0, Math.min(100, state.affection + delta));

        // 結果表示
        await printSlow(`\n💬 「${responseText}」`, 40, 'pink');
        const deltaColor = delta >= 0 ? 'green' : 'red';
        await printSlow(`   → 好感度が ${delta} 変動しました。`, 20, deltaColor);

        updateStatus();

        // 選択肢エリアをクリア
        choicesArea.innerHTML = '';

        await new Promise(r => setTimeout(r, 400));

        // ゲーム終了チェック
        if (state.forcePush) {
            await showForcePushEnding();
            return;
        }

        if (state.affection >= 100) {
            await showEnding();
            return;
        }

        if (state.affection <= 0) {
            await showEnding();
            return;
        }

        if (state.turn >= state.maxTurns) {
            await showEnding();
            return;
        }

        // 次のシーンへ
        if (window._choiceResolver) {
            const resolve = window._choiceResolver;
            window._choiceResolver = null;
            resolve();
            // 次のシーンを実行
            runScene();
        }
    }

    // ---------- エンディング表示 ----------
    async function showEnding() {
        if (state.ended) return;
        state.ended = true;
        state.gameOver = true;

        await printSlow('\n' + '='.repeat(50), 10, 'gray');
        await printSlow('         🌟 グランドフィナーレ 🌟', 30, 'bold');
        await printSlow('='.repeat(50), 10, 'gray');

        const aff = state.affection;

        if (aff >= 85) {
            await printSlow('💞 トゥルーエンド: 「君と一緒にいると、コードが輝いて見える」', 50, 'red');

        } else {
            await printSlow('💔 バッドエンド: 「…でも、また明日ね？」', 50, 'red');
            await printSlow('メタ子は去り際、ほんの少しだけ振り返って「…また明日、来るんでしょ？」と呟いた。', 40, 'red');
            await printSlow('完全に嫌われてはいない。まだチャンスはある。', 30, 'gray');
        }

        await printSlow('\n  おわり', 30, 'pink');

        choicesArea.innerHTML = '';
        const btn = document.createElement('button');
        btn.textContent = '🔄 もう一度遊ぶ';
        btn.style.gridColumn = '1 / -1';
        btn.style.textAlign = 'center';
        btn.addEventListener('click', resetGame);
        choicesArea.appendChild(btn);

    // ---------- force push エンディング ----------
    async function showForcePushEnding() {
        if (state.ended) return;
        state.ended = true;
        state.gameOver = true;

        await printSlow('\n' + '='.repeat(50), 10, 'gray');
        await printSlow('         💀 ゲームオーバー 💀', 50, 'bold');
        await printSlow('='.repeat(50), 10, 'gray');
        await printSlow('あなたはメタ子のGitHubリポジトリでforce pushを実行した。', 40, 'red');
        await printSlow('全てのコミット履歴が消え去り、メタ子はあなたを二度と許さなかった。', 40, 'red');
        await printSlow('『もう…絶対に、あなたと一緒にコードを書くなんてしない…』', 40, 'pink');
        await printSlow('ターミナルには \'yurusanai.com\' と表示された。', 40, 'gray');
        await printSlow('\n  おわり', 30, 'red');

        choicesArea.innerHTML = '';
        const btn = document.createElement('button');
        btn.textContent = '🔄 もう一度遊ぶ';
        btn.style.gridColumn = '1 / -1';
        btn.style.textAlign = 'center';
        btn.addEventListener('click', resetGame);
        choicesArea.appendChild(btn);
    }

    // ---------- ゲームリセット ----------
    function resetGame() {
        // タイマー停止
        if (printTimer) {
            clearTimeout(printTimer);
            printTimer = null;
        }
        isPrinting = false;

        state = {
            affection: 50,
            sceneCount: 0,
            rescueUsed: false,
            forcePush: false,
            gameOver: false,
            turn: 0,
            maxTurns: 30,
            ended: false,
        };

        messageArea.innerHTML = '';
        choicesArea.innerHTML = '';
        window._choiceResolver = null;

        updateStatus();
        showHeart();
        addMessage('⚡ システム起動: 恋愛ドラマ・クリア可能バランス版');
        addMessage('ようこそ、テック・オフィスへ。');
        addMessage('あなたの選択が、物語を変える。');
        addMessage('');

        // ゲーム開始
        setTimeout(() => runScene(), 400);
    }

    // ---------- スタート ----------
    resetBtn.addEventListener('click', resetGame);

    // 自動開始
    setTimeout(() => {
        addMessage('');
        addMessage('💻 キーボードの代わりに、ボタンをクリックして進めてください。');
        setTimeout(() => runScene(), 500);
    }, 600);

})();
